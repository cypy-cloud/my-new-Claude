<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1a7a6e"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d8e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#0a1f3a" flood-opacity="0.35"/>
    </filter>
    <!-- top glow blob -->
    <radialGradient id="blob" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#2d5a8e;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)" rx="220"/>

  <!-- Top glow blob -->
  <ellipse cx="512" cy="0" rx="480" ry="300" fill="url(#blob)"/>

  <!-- Shield -->
  <path filter="url(#shadow)"
    d="M512 140 L760 250 L760 520 Q760 700 512 880 Q264 700 264 520 L264 250 Z"
    fill="url(#shield-grad)"/>

  <!-- Shield inner highlight border -->
  <path
    d="M512 175 L730 273 L730 518 Q730 678 512 842 Q294 678 294 518 L294 273 Z"
    fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="6"/>

  <!-- 4-pointed star sparkle -->
  <path
    d="M512 310 L532 460 L682 480 L532 500 L512 650 L492 500 L342 480 L492 460 Z"
    fill="#1e5a6e"/>

  <!-- Subtle highlight dots on shield -->
  <circle cx="370" cy="600" r="10" fill="rgba(255,255,255,0.35)"/>
  <circle cx="450" cy="640" r="7" fill="rgba(255,255,255,0.25)"/>
</svg>
